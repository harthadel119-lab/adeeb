name: Build Tweak
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Tweak
        run: |
          # 1. إعداد مسار عمل فريد ومؤقت
          export WORK_DIR=$(mktemp -d)
          export THEOS=$WORK_DIR/theos
          
          # 2. تحميل Theos داخل المجلد المؤقت
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 3. تحميل الـ SDKs داخل المجلد المؤقت
          git clone https://github.com/theos/sdks.git $THEOS/sdks
          
          # 4. إضافة مسار bin للـ Theos للـ PATH
          export PATH=$THEOS/bin:$PATH
          
          # 5. البناء
          make clean
          make
          
      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: TheebVIP-Package
          path: ./.theos/obj/debug/*.dylib
