name: Build Tweak
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare and Build
        run: |
          # تنظيف بيئة Theos بالكامل
          rm -rf ~/theos
          
          # تحميل Theos
          git clone --recursive https://github.com/theos/theos.git ~/theos
          
          # تحميل الـ SDKs في مجلد جديد ومختلف لتجنب التعارض
          git clone https://github.com/theos/sdks.git ~/theos/sdks_new
          
          # توجيه Theos لاستخدام هذا المجلد الجديد
          export THEOS=/home/runner/theos
          export THEOS_SDK_DIR=/home/runner/theos/sdks_new
          export PATH=$THEOS/bin:$PATH
          
          # البناء
          make clean
          make
          
      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: TheebVIP-Package
          path: ./.theos/obj/debug/*.dylib
