name: Build Tweak
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          
      - name: Install SDKs
        run: |
          # تحميل الـ SDKs بشكل مباشر إلى المجلد الصحيح
          mkdir -p ~/theos/sdks
          git clone https://github.com/theos/sdks.git ~/theos/sdks
          # تنظيف المجلد من أي ملفات غير ضرورية قد تعيق العملية
          rm -rf ~/theos/sdks/.git
          
      - name: Build
        run: |
          export THEOS=/home/runner/theos
          export PATH=$THEOS/bin:$PATH
          # تشغيل البناء مع توضيح المسارات
          make clean
          make
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheebVIP-Package
          path: ./.theos/obj/debug/*.dylib
