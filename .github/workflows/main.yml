name: Build Tweak
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Tweak
        run: |
          # إنشاء اسم مجلد عشوائي لكل عملية بناء
          export BUILD_ID=$RANDOM
          export THEOS=/tmp/theos_$BUILD_ID
          export SDKS_DIR=/tmp/sdks_$BUILD_ID
          
          # تحميل Theos والـ SDKs في مسارات فريدة لن تتكرر أبداً
          git clone --recursive https://github.com/theos/theos.git $THEOS
          git clone https://github.com/theos/sdks.git $SDKS_DIR
          
          # ربط الـ SDKs داخل مجلد Theos الجديد
          ln -s $SDKS_DIR $THEOS/sdks
          
          # إعداد PATH والبناء
          export PATH=$THEOS/bin:$PATH
          make clean
          make
          
      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: TheebVIP-Package
          path: ./.theos/obj/debug/*.dylib
