name: Build Tweak
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Tweak
        run: |
          # نستخدم مساراً مختلفاً كلياً باسم 'work_theos' لضمان عدم وجود تضارب
          export THEOS=/home/runner/work_theos
          
          # تحميل Theos إلى المسار الجديد
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # تحميل SDKs إلى المجلد الصحيح داخل المسار الجديد
          git clone https://github.com/theos/sdks.git $THEOS/sdks
          
          # إعداد PATH
          export PATH=$THEOS/bin:$PATH
          
          # البناء
          make clean
          make
          
      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: TheebVIP-Package
          path: ./.theos/obj/debug/*.dylib
