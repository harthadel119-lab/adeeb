name: Build Tweak
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Theos Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang ldid
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
      - name: Build Tweak
        run: |
          export THEOS=/home/runner/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          make
      - name: Upload dylib
        uses: actions/upload-artifact@v3
        with:
          name: Tweak-Output
          path: ./.theos/obj/debug/
