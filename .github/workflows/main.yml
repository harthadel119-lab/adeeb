name: Build Tweak
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          # تنظيف أي مسارات قديمة لمنع خطأ 128
          rm -rf ~/theos
          
      - name: Install Theos and SDKs
        run: |
          # تحميل Theos مع المكونات الفرعية
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # تحميل الـ SDKs داخل مجلد Theos
          git clone https://github.com/theos/sdks.git ~/theos/sdks
          
      - name: Build Tweak
        run: |
          # تصدير متغيرات البيئة الأساسية
          export THEOS=/home/runner/theos
          export PATH=$THEOS/bin:$PATH
          
          # البناء النظيف
          make clean
          make
          
      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: TheebVIP-Package
          path: ./.theos/obj/debug/*.dylib
