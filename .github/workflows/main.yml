name: Build Tweak
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          # تنظيف أي بيئة سابقة لضمان عدم وجود تضارب
          rm -rf ~/theos
          # تحميل Theos مع المكونات الفرعية
          git clone --recursive https://github.com/theos/theos.git ~/theos
          
      - name: Install SDKs
        run: |
          # التأكد من وجود مجلد الـ SDKs وتنزيلها
          mkdir -p ~/theos/sdks
          git clone https://github.com/theos/sdks.git ~/theos/sdks
          
      - name: Build Tweak
        run: |
          # تصدير المسارات الضرورية للبناء
          export THEOS=/home/runner/theos
          export PATH=$THEOS/bin:$PATH
          
          # البناء النظيف
          make clean
          make
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheebVIP-Package
          path: ./.theos/obj/debug/*.dylib
