name: Build Tweak
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Theos and SDKs
        run: |
          # تنصيب Theos وتجهيزه
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # تحميل الـ SDKs في مسارها الصحيح لضمان عدم وجود أخطاء مسارات
          git clone https://github.com/theos/sdks.git ~/theos/sdks
          
      - name: Build Tweak
        run: |
          # تصدير متغيرات البيئة الأساسية
          export THEOS=/home/runner/theos
          export PATH=$THEOS/bin:$PATH
          
          # البناء النظيف
          make clean
          make
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tweak-Output
          path: ./.theos/obj/debug/*.dylib
