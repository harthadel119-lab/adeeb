name: Build Tweak
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          
      - name: Install SDKs
        run: |
          # إذا كان المجلد موجوداً، لن نحمل SDKs جديدة لتجنب الخطأ
          if [ ! -d "/home/runner/theos/sdks" ]; then
            git clone https://github.com/theos/sdks.git ~/theos/sdks
          fi
          
      - name: Build
        run: |
          export THEOS=/home/runner/theos
          export PATH=$THEOS/bin:$PATH
          make clean
          make
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheebVIP-Package
          path: ./.theos/obj/debug/*.dylib
