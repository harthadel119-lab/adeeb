name: Build Tweak
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          # 1. تنظيف شامل
          rm -rf ~/theos
          
          # 2. تحميل Theos
          git clone --recursive https://github.com/theos/theos.git ~/theos
          
          # 3. تحميل الـ SDKs مباشرة داخل مجلد Theos الأساسي
          # هذا يضمن أن Theos يراها تلقائياً بدون إعدادات إضافية
          git clone https://github.com/theos/sdks.git ~/theos/sdks
          
      - name: Build Tweak
        run: |
          # 4. إعداد متغيرات البيئة الأساسية
          export THEOS=/home/runner/theos
          export PATH=$THEOS/bin:$PATH
          
          # 5. التفعيل الإجباري للـ SDKs
          # قد تحتاج بعض إصدارات Theos لهذه الخطوة
          ln -s ~/theos/sdks ~/theos/SDKs
          
          # 6. البناء
          make clean
          make
          
      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: TheebVIP-Package
          path: ./.theos/obj/debug/*.dylib
