name: Build Tweak
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          # تنظيف أي مسارات قديمة لـ Theos لضمان بيئة نظيفة
          rm -rf ~/theos
          
      - name: Install Theos and SDKs
        run: |
          # تحميل Theos
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # تحميل الـ SDKs داخل مجلد Theos
          git clone https://github.com/theos/sdks.git ~/theos/sdks
          
      - name: Build Tweak
        run: |
          # إعداد متغيرات البيئة
          export THEOS=/home/runner/theos
          export PATH=$THEOS/bin:$PATH
          
          # تنفيذ عملية البناء
          make clean
          make
          
      - name: Upload Output
        uses
